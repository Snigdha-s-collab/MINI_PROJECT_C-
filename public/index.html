<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InternMatch | Premium Internship Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Dynamic Background Elements -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">Intern<span class="highlight">Match</span></h1>
            <div id="nav-links" class="nav-links">
                <!-- Injected via JS depending on auth state -->
            </div>
        </div>
    </nav>

    <!-- Main Content Container (SPA) -->
    <main id="app-content" class="container glass-panel fade-in">
        <!-- Rendered by JS -->
    </main>

    <!-- Notification Toast -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Loading Overlay -->
    <div id="loader" class="loader-overlay hidden">
        <div class="spinner"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
